schema: viewport.workflow/v1
name: payments/jira-autofix
title: Jira bug autofix
description: Route a Jira bug to a private runner, collect context, test, propose a PR, gate side effects, and update Jira after approval.
inputs:
  integration_event:
    type: json
    required: true
triggers:
  - type: webhook
    provider: jira
    eventTypes: [issue_created]
    signature:
      algorithm: hmac-sha256
      header: X-Viewport-Signature
      timestampHeader: X-Viewport-Timestamp
      toleranceSeconds: 300
runner:
  kind: self_hosted_runner
  target: self_hosted
  labels: [payments-vps]
  capabilities: [agent.prompt, shell, worktree, secrets]
  leaseSeconds: 1800
policies:
  run:
    allowed: [team:payments]
    requireOnlineRunner: true
  approve:
    allowed: [team:payments-reviewers]
    minApprovals: 1
  sideEffects:
    requireApproval: true
    allowedAdapters: [github, jira]
  maxDurationSeconds: 7200
notifications:
  inbox: [approval_requested, run_failed]
  email: [run_failed]
dataCapture:
  logs: compact
  artifacts: true
  contextEvidence: true
  approvalPackets: true
context:
  - ref: ctx_payment_guardrails
    as: payment_rules
    refresh: before_run
requires:
  agents: [codex]
  tools: [shell]
  integrations: [github, jira]
  secrets: [github/token, jira/token]
nodes:
  gather_context:
    type: context
    refs: [ctx_payment_guardrails]
    query: "checkout lowercase discount bug"
  investigate:
    type: agent
    needs: [gather_context]
    agent: codex
    model: gpt-5.5
    prompt: "Investigate {{ inputs.integration_event.payload.key }} using {{ nodes.gather_context.output }}."
  tests:
    type: shell
    needs: [investigate]
    command: "printf tests-pass"
  open_pr:
    type: action
    needs: [tests]
    adapter: github
    action: pull_request.create
    requiresApproval: true
    idempotencyKey: "pr:{{ inputs.integration_event.payload.key }}"
    with:
      title: "Fix {{ inputs.integration_event.payload.key }}"
      body: "Generated by Viewport workflow."
  update_jira:
    type: action
    needs: [open_pr]
    adapter: jira
    action: issue.transition
    idempotencyKey: "jira:{{ inputs.integration_event.payload.key }}"
    with:
      issue: "{{ inputs.integration_event.payload.key }}"
      status: In Review
