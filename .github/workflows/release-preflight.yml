name: Release Preflight

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/daemon/**'
      - 'package.json'
      - 'package-lock.json'
      - '.releaserc.daemon.json'
      - '.github/workflows/release-packages.yml'
      - '.github/workflows/release-preflight.yml'
  workflow_dispatch:

jobs:
  daemon-npm-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        shell: bash
        run: |
          should_run=true
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            should_run=false
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
            while IFS= read -r file; do
              case "$file" in
                packages/daemon/*|packages/daemon/**|package.json|package-lock.json|.releaserc.daemon.json|.github/workflows/release-packages.yml)
                  should_run=true
                  ;;
              esac
            done <<< "$changed_files"
          fi
          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"

      - name: Skip daemon release preflight
        if: steps.changes.outputs.should_run != 'true'
        run: echo "No daemon package or daemon release changes detected; skipping npm auth preflight."

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.should_run == 'true'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - run: npm ci
        if: steps.changes.outputs.should_run == 'true'

      - name: Validate daemon publish metadata
        if: steps.changes.outputs.should_run == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('packages/daemon/package.json', 'utf8'));
          const expectedRepoUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}.git`;
          if (pkg.repository?.url !== expectedRepoUrl) {
            console.error(`repository.url must equal ${expectedRepoUrl}, got: ${pkg.repository?.url}`);
            process.exit(1);
          }
          if (pkg.repository?.directory !== 'packages/daemon') {
            console.error(`repository.directory must equal packages/daemon, got: ${pkg.repository?.directory}`);
            process.exit(1);
          }
          if (pkg.bin?.vpd !== 'bin/vpd.js') {
            console.error(`bin.vpd must equal bin/vpd.js, got: ${pkg.bin?.vpd}`);
            process.exit(1);
          }
          NODE

      - name: Verify release secret is configured
        if: steps.changes.outputs.should_run == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN is not configured for this repository."
            exit 1
          fi

      - name: Verify npm authentication
        if: steps.changes.outputs.should_run == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami --registry https://registry.npmjs.org/

      - name: Verify commit-analyzer preset dependency
        if: steps.changes.outputs.should_run == 'true'
        run: node -p "require.resolve('conventional-changelog-conventionalcommits')"
