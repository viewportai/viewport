name: Deploy Relay

on:
  workflow_run:
    workflows: ['Relay Image']
    types: [completed]
  workflow_dispatch:

concurrency:
  group: relay-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Select relay image
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            short_sha="$(printf '%s' "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)"
            echo "RELAY_IMAGE=ghcr.io/viewportai/relay:sha-${short_sha}" >> "$GITHUB_ENV"
          else
            echo "RELAY_IMAGE=ghcr.io/viewportai/relay:latest" >> "$GITHUB_ENV"
          fi
      - name: Deploy relay to Fly
        run: flyctl deploy --image "$RELAY_IMAGE" -c services/relay/fly.toml -a viewport-relay --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
