# SEC-02: Secret-scanning CI gate (gitleaks)
#
# Fails the build when a secret is committed. Runs on push to main and on every
# pull request.
#
# Implementation note: we invoke the gitleaks BINARY (MIT-licensed, free)
# directly rather than gitleaks/gitleaks-action@v2, because that Action requires
# a paid GITLEAKS_LICENSE for organization-owned repos. The binary has no such
# restriction.
#
# Scan scope:
#   - pull_request: scan only the commits in the PR (base..head) via --log-opts.
#   - push:         scan the full history of the repo (catches anything new).
#
# Allowlist for known-safe matches (test fixtures, protocol vectors) lives in
# /.gitleaks.toml at the repo root. Keep it tight.
#
# --- How to verify the gate actually fails (planted-secret test) ---
#   1. printf 'stripe_live = "sk_%s_%s"\n' live "$(openssl rand -hex 12)" > /tmp/leak.txt
#   2. gitleaks detect --no-git --source /tmp --config .gitleaks.toml -v
#   3. Observe: "leaks found: 1" and a non-zero exit code.
#   4. Delete the scratch file. Never commit a real-looking secret.

name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: 8.30.1

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can diff the PR commit range.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan pull request commits
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          gitleaks detect \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            -v

      - name: Scan full history
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          gitleaks detect \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            -v
